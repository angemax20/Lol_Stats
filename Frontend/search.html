<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invocadores</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="navbar">
    <div class="nav-item"
     onclick="window.location.href='search.html'">
     Invocadores
    </div>
    <div class="nav-item"
    onclick="window.location.href='tierlist.html'">
    Tier list
    </div>
    <div class="nav-item">Campeones</div>
    <div class="nav-item">LeaderBoards</div>
    <div class="nav-item" 
    onclick="window.location.href='dashboard.html'">
    Cuenta
    </div>
    <div class="nav-item">Generar torneo</div>
  </div>

  <div class="search-container">

    <h1>Buscar Invocador</h1>

    <div class="search-box">

      <input
        type="text"
        id="summoner-name"
        placeholder="Riot ID (Nombre#TAG)"
      >

      <select id="region-select">
        <option value="LAN">LAN</option>
        <option value="LAS">LAS</option>
        <option value="NA">NA</option>
        <option value="EUW">EUW</option>
        <option value="KR">KR</option>
      </select>

      <button onclick="searchSummoner()">
        Buscar
      </button>

    </div>

    <div id="summoner-result"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="config/supabase.js"></script>

  <script src="js/auth.js"></script>
  <script src="js/search.js"></script>

  <script>
    loadUser();
  </script>

</body>
</html>
