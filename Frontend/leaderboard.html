<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Leaderboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="navbar">
    <div class="nav-item" onclick="window.location.href='search.html'">Invocadores</div>
    <div class="nav-item" onclick="window.location.href='tierlist.html'">Tier list</div>
    <div class="nav-item" onclick="window.location.href='champions.html'">Campeones</div>
    <div class="nav-item" onclick="window.location.href='leaderboard.html'">LeaderBoards</div>
    <div class="nav-item" onclick="window.location.href='favorites.html'">Favoritos</div>
    <div class="nav-item" onclick="window.location.href='dashboard.html'">Cuenta</div>
    <div class="nav-item" onclick="window.location.href='tournament.html'">Torneos</div>
  </div>

  <main class="leaderboard-page">
    <h1 class="leaderboard-title">Leaderboard</h1>

    <div class="leaderboard-controls">
    <select
        id="leaderboard-tier"
        class="leaderboard-tier-select"
        onchange="loadLeaderboard()"
        >
        <option value="Retador">Retador</option>
        <option value="Gran Maestro">Gran Maestro</option>
        <option value="Maestro">Maestro</option>
    </select>

    <select
        id="leaderboard-region"
        class="leaderboard-tier-select"
        onchange="loadLeaderboard()"
        >
        <option value="all">Todas las regiones</option>
        <option value="LAN">LAN</option>
        <option value="LAS">LAS</option>
        <option value="NA">NA</option>
        <option value="EUW">EUW</option>
        <option value="KR">KR</option>
    </select>

    <input
        type="text"
        id="leaderboard-search"
        class="leaderboard-search-input"
        placeholder="Buscar invocador"
        autocomplete="off"
        >
    </div>

    <section class="leaderboard-panel">
      <div class="leaderboard-header">
        <span>#</span>
        <span>Invocador</span>
        <span>Región</span>
        <span>Rango</span>
        <span>LP</span>
        <span>Winrate</span>
      </div>

      <div id="leaderboard-list"></div>
    </section>
  </main>

  <script src="js/leaderboard.js"></script>

</body>
</html>
